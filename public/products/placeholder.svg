<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#111111"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="#222222"/>
  </pattern>
  <rect width="800" height="800" fill="url(#dots)"/>

  <!-- Frame -->
  <rect x="80" y="80" width="640" height="640" fill="none" stroke="#1f1f1f" stroke-width="2" stroke-dasharray="8 12"/>

  <!-- Yellow pill + orange PRINT mark, matching brand logo -->
  <g transform="translate(400 360)">
    <rect x="-200" y="-58" width="320" height="116" rx="58" fill="#FFD600"/>
    <text x="-180" y="22" font-family="Bebas Neue, Impact, sans-serif" font-size="78" font-weight="900" fill="#0a0a0a" letter-spacing="2">SHANDAAR</text>
    <text x="140" y="22" font-family="Bebas Neue, Impact, sans-serif" font-size="78" font-weight="900" fill="#FF7A00" letter-spacing="2">PRINT.</text>
  </g>

  <!-- Helper text -->
  <text x="400" y="500" text-anchor="middle" font-family="Bebas Neue, Impact, sans-serif" font-size="34" fill="#d4f062" letter-spacing="6">PRODUCT IMAGE</text>
  <text x="400" y="538" text-anchor="middle" font-family="Bebas Neue, Impact, sans-serif" font-size="20" fill="#666660" letter-spacing="4">DROP YOURS IN /public/products/</text>

  <!-- Corner ticks -->
  <g stroke="#d4f062" stroke-width="2" fill="none">
    <path d="M80 130 L80 80 L130 80"/>
    <path d="M720 130 L720 80 L670 80"/>
    <path d="M80 670 L80 720 L130 720"/>
    <path d="M720 670 L720 720 L670 720"/>
  </g>
</svg>
